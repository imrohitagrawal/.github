name: Bug Report
description: Report a bug, defect, or unexpected behavior.
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the sections below.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
      placeholder: e.g. "Login fails with 500 when email contains a plus sign"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs, stack traces, or attach screenshots. Remove any secrets first.
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, dependency versions, branch / commit.
      placeholder: "macOS 14.4, Python 3.11.5, commit abc123"
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How bad is the impact?
      options:
        - Low — cosmetic / minor
        - Medium — broken feature, workaround exists
        - High — broken core feature, no workaround
        - Critical — data loss / security / outage
      validations:
        required: true