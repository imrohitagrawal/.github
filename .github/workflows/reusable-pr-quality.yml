name: PR Quality Gate (reusable)

# Reusable quality gate called by each consuming repo's caller-pr-quality.yml.
# Performs deterministic checks: lint, type check, tests, security scans (bandit, semgrep,
# gitleaks), and dependency audit. Adapts to whatever language/tooling the target repo has.
#
# Severity rule: any failure here fails the check. Branch protection / rulesets in the
# consuming repo decide whether a failed check blocks merge. On GitHub Free for public
# repos, branch protection can require this check. On GitHub Free for private repos,
# branch protection / rulesets may be limited — see docs/branch-protection.md.
#
# Tools used (all free, open-source):
#   - Python: ruff, mypy, pytest, bandit, pip-audit
#   - Node:   npm ci, npm audit
#   - Cross-language: gitleaks (secrets), semgrep OSS (security patterns)

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- Always run: secret scan ----------
      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # ---------- Always run: cross-language security patterns ----------
      - name: Semgrep OSS security scan
        if: hashFiles('semgrep.yml', '.semgrep.yml', '.semgrep/', 'semgrep/') != ''
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            ${{ hashFiles('semgrep.yml') != '' && 'semgrep.yml' ||
                 hashFiles('.semgrep.yml') != '' && '.semgrep.yml' ||
                 hashFiles('.semgrep/') != '' && '.semgrep/' ||
                 hashFiles('semgrep/') != '' && 'semgrep/' ||
                 'p/security-audit p/secrets p/owasp-top-ten' }}

      # ---------- Detect language and dispatch ----------
      - name: Detect project layout
        id: detect
        run: |
          echo "has_makefile_ci=$([ -f Makefile ] && grep -q '^ci:' Makefile && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_package_json=$([ -f package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_python=$([ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_mypy_config=$([ -f mypy.ini ] || [ -f .mypy.ini ] || [ -f pyproject.toml ] && grep -q '\[tool.mypy\]' pyproject.toml 2>/dev/null && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "uses_uv=$([ -f Makefile ] && grep -qE '(^|[^a-zA-Z])uv([^a-zA-Z]|$)' Makefile && echo true || ([ -f pyproject.toml ] && [ -f uv.lock ] && echo true || echo false))" >> "$GITHUB_OUTPUT"
          echo "uses_node=$([ -f .nvmrc ] || [ -f .node-version ] || grep -qE '(^|[^a-zA-Z])(nvm|node)([^a-zA-Z]|$)' Makefile 2>/dev/null && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # ---------- Tooling install (needed by Path 1 — make ci) ----------
      - name: Install uv (Python 3.12)
        if: steps.detect.outputs.uses_uv == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install Node.js
        if: steps.detect.outputs.has_package_json == 'true' || steps.detect.outputs.uses_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ---------- System Python for non-uv Python projects ----------
      - name: Set up Python
        if: steps.detect.outputs.has_python == 'true' && steps.detect.outputs.uses_uv != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---------- Path 1: Makefile-driven ----------
      - name: Run make ci
        if: steps.detect.outputs.has_makefile_ci == 'true'
        run: make ci

      # ---------- Path 2: Node ----------
      - name: npm ci
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm ci

      - name: npm lint
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm run lint --if-present
        continue-on-error: true

      - name: npm typecheck
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm run typecheck --if-present
        continue-on-error: true

      - name: npm test
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm test --if-present
        continue-on-error: true

      - name: npm build
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm run build --if-present
        continue-on-error: true

      - name: npm audit (high+)
        if: steps.detect.outputs.has_package_json == 'true'
        run: npm audit --audit-level=high || true

      # ---------- Path 3: Python ----------
      - name: Set up Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip install tools
        if: steps.detect.outputs.has_python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest mypy bandit pip-audit

      - name: pip install -r requirements.txt
        if: steps.detect.outputs.has_python == 'true'
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi

      - name: ruff check
        if: steps.detect.outputs.has_python == 'true'
        run: ruff check .

      - name: pytest
        if: steps.detect.outputs.has_python == 'true' && hashFiles('tests/', 'test/', 'pytest.ini', 'pyproject.toml') != ''
        run: pytest -q || echo "pytest failed"

      - name: mypy
        if: steps.detect.outputs.has_python == 'true' && steps.detect.outputs.has_mypy_config == 'true'
        run: mypy .

      - name: bandit
        if: steps.detect.outputs.has_python == 'true'
        run: bandit -r . -x tests,test,node_modules,.venv,venv || echo "bandit findings reported"

      - name: pip-audit
        if: steps.detect.outputs.has_python == 'true'
        run: pip-audit || echo "pip-audit findings reported"

      # ---------- Fallback: nothing matched ----------
      - name: No recognized project files
        if: steps.detect.outputs.has_makefile_ci == 'false' && steps.detect.outputs.has_package_json == 'false' && steps.detect.outputs.has_python == 'false'
        run: |
          echo "::notice::No Makefile ci target, package.json, or Python project files detected."
          echo "::notice::Falling back to secret scan only. Consider adding a Makefile or language manifest."